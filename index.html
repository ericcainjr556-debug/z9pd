<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the big pix</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url('https://media.discordapp.net/attachments/1483174776598958223/1503512784196075641/oggtag.webp?ex=6a039ee5&is=6a024d65&hm=4714828449eafea98ba29b7ace0c20d64e86dbb24c2b7f354c796b621d9fd355&animated=true') center/cover no-repeat fixed;
    color: white;
    overflow-x: hidden;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(7px);
    z-index: 0;
}

/* INTRO */
#intro {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    background: rgba(0,0,0,0.82);
}

.pfp {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid #ff2e63;
    box-shadow: 0 0 50px #ff2e63;
    margin-bottom: 20px;
}

.username {
    font-family: 'Orbitron';
    font-size: 42px;
    text-shadow: 0 0 20px #ff2e63;
}

.enter-btn {
    margin-top: 40px;
    padding: 16px 70px;
    border: 2px solid #00ffcc;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    font-weight: 600;
}

.enter-btn:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 30px #00ffcc;
    transform: scale(1.05);
}

/* MAIN */
#main {
    display: none;
    position: relative;
    z-index: 2;
    min-height: 100vh;
    padding: 40px 20px;
}

/* CARD */
.card {
    max-width: 1100px;
    margin: auto;
    background: rgba(15,15,15,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 50px;
    box-shadow:
        0 0 50px rgba(0,0,0,0.5),
        0 0 30px rgba(255,0,98,0.15);
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 15px;
}

.views {
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 14px;
    backdrop-filter: blur(10px);
}

.views span {
    color: #00ffcc;
    font-weight: 700;
}

/* LAYOUT */
.container {
    display: flex;
    gap: 60px;
    align-items: center;
}

/* LEFT SIDE */
.left {
    flex: 1;
    display: flex;
    justify-content: center;
}

/* MAIN PFP */
.main-pfp {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff2e63;
    box-shadow:
        0 0 60px rgba(255, 0, 100, 0.75),
        0 0 100px rgba(255,0,98,0.2);
}

/* RIGHT SIDE */
.right {
    flex: 1;
}

.name {
    font-family: 'Orbitron';
    font-size: 58px;
    margin-bottom: 8px;
    text-shadow: 0 0 20px #ff2e63;
}

.tag {
    opacity: 0.7;
    margin-bottom: 35px;
    font-size: 17px;
}

/* BIO */
.bio {
    font-size: 18px;
    line-height: 2;
    margin-bottom: 40px;
    color: rgba(255,255,255,0.88);
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    padding: 14px 24px;
    border-radius: 14px;
    border: 2px solid #ff2e63;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    user-select: none;
}

.btn:hover {
    background: #ff2e63;
    box-shadow: 0 0 25px #ff2e63;
    transform: translateY(-2px);
}

/* MUSIC BUTTON */
.music {
    border-color: #00ffcc;
}

.music:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 25px #00ffcc;
}

/* SMALL GLOW DOTS */
.glow {
    position: fixed;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.22;
    z-index: 1;
}

.glow1 {
    background: #ff0066;
    top: -50px;
    left: -50px;
}

.glow2 {
    background: #00ffcc;
    bottom: -50px;
    right: -50px;
}

/* MOBILE */
@media(max-width: 900px) {

    .card {
        padding: 35px 25px;
    }

    .container {
        flex-direction: column;
        text-align: center;
    }

    .main-pfp {
        width: 180px;
        height: 180px;
    }

    .name {
        font-size: 42px;
    }

    .top-bar {
        justify-content: center;
    }
}
</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<!-- INTRO -->
<div id="intro">
    <img src="https://media.discordapp.net/attachments/1483174776598958223/1503512783906672681/pixiescoolcat.webp?ex=6a039ee5&is=6a024d65&hm=6c76a5b5289c062ef66a8e98a5f243ceb05a2d6abca86321f34afab9a484836e&animated=true" class="pfp">

    <div class="username">the big pix</div>

    <div class="enter-btn" id="enterBtn">
        enter
    </div>
</div>

<!-- MAIN -->
<div id="main">

    <div class="card">

        <div class="top-bar">
            <div class="views">
                👁️ views:
                <span id="viewCount">0</span>
            </div>
        </div>

        <div class="container">

            <!-- LEFT -->
            <div class="left">
                <img src="https://media.discordapp.net/attachments/1483174776598958223/1503512783906672681/pixiescoolcat.webp?ex=6a039ee5&is=6a024d65&hm=6c76a5b5289c062ef66a8e98a5f243ceb05a2d6abca86321f34afab9a484836e&animated=true" class="main-pfp">
            </div>

            <!-- RIGHT -->
            <div class="right">

                <div class="name">pixie</div>

                <div class="tag">
                    @whitetoessummer
                </div>

                <div class="bio">
                    single :(<br>
                    twins - gweg, snicks, dre1mer, korps, scrubz, bt, koda, whatdoido
                </div>

                <div class="buttons">
                    <div class="btn music" id="musicBtn">
                        ⏸ crash - bunii
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<audio id="audioPlayer" loop></audio>

<script>
const enterBtn = document.getElementById('enterBtn');
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const musicBtn = document.getElementById('musicBtn');
const audio = document.getElementById('audioPlayer');
const viewCount = document.getElementById('viewCount');

let isPlaying = true;

/* SONG */
audio.src = "https://cdn.discordapp.com/attachments/1483174776598958223/1503512886973300829/bunii_-_crash_Official_Music_Video.mp3?ex=6a039efe&is=6a024d7e&hm=5a9a777e909026bdcf3b87ae2abeb8de48d0fc2ca47d6c2f127be1eb10d67000&";

/* ENTER */
enterBtn.onclick = () => {
    intro.style.display = "none";
    main.style.display = "block";

    audio.play().catch(()=>{});
};

/* MUSIC TOGGLE */
musicBtn.onclick = () => {

    if (isPlaying) {
        audio.pause();
        musicBtn.innerHTML = "▶ crash - bunii";
    } else {
        audio.play();
        musicBtn.innerHTML = "⏸ crash - bunii";
    }

    isPlaying = !isPlaying;
};

/* VIEW COUNTER */
let views = localStorage.getItem("pixieViews");

if (!views) {
    views = 0;
}

views++;

localStorage.setItem("pixieViews", views);

viewCount.innerText = views;
</script>

</body>
</html>
