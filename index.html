<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pixie</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url('https://cdn.discordapp.com/attachments/1474143370346496111/1486149553748181196/T_LS-FNBR-KetArt.webp') center/cover no-repeat fixed;
    color: white;
    overflow: hidden;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
}

/* INTRO */
#intro {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2;
    animation: fadeIn 1s ease;
}

.pfp {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 4px solid #ff4d88;
    box-shadow: 0 0 40px #ff4d88;
    margin-bottom: 30px;
}

.username {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 1px;
}

.status {
    opacity: 0.7;
    margin-bottom: 50px;
}

.enter-btn {
    padding: 14px 60px;
    border-radius: 12px;
    border: 2px solid #00ffcc;
    cursor: pointer;
    transition: 0.3s;
}

.enter-btn:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 25px #00ffcc;
}

/* MAIN */
#main {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 2;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    width: 320px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    animation: fadeUp 0.8s ease;
}

.main-pfp {
    width: 120px;
    border-radius: 50%;
    border: 3px solid #ff4d88;
    margin-bottom: 20px;
}

.main-username {
    font-size: 24px;
    margin-bottom: 20px;
}

.bio {
    font-size: 14px;
    opacity: 0.8;
    line-height: 1.8;
    margin-bottom: 25px;
}

/* BUTTON */
.music-btn {
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    border: 2px solid #ff4d88;
    background: transparent;
    color: #ff4d88;
    cursor: pointer;
    transition: 0.3s;
}

.music-btn:hover {
    background: #ff4d88;
    color: black;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="https://i.imgur.com/8Km9tLL.png" class="pfp">
    <div class="username">pixie</div>
    <div class="status">z9pd</div>
    <div class="enter-btn" id="enterBtn">Enter</div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="card">
        <img src="https://i.imgur.com/8Km9tLL.png" class="main-pfp">
        <div class="main-username">@z9pd</div>

        <div class="bio">
            16 in 8 months<br>
            Alana 💖<br>
            best friends - Ires, Kdot, Momkey, PalmTree, Koda, Gweg<br>
            developer/modder
        </div>

        <button class="music-btn" id="musicBtn">⏸ boyfriend - aeter</button>
        <audio id="audioPlayer" loop></audio>
    </div>
</div>

<script>
const enterBtn = document.getElementById('enterBtn');
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const musicBtn = document.getElementById('musicBtn');
const audio = document.getElementById('audioPlayer');

let isPlaying = true;

audio.src = "https://cdn.discordapp.com/attachments/1485354899272372364/1486146593077067826/boyfriend.mp3";

enterBtn.onclick = () => {
    intro.style.display = "none";
    main.style.display = "flex";
    audio.play().catch(() => {});
};

musicBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        musicBtn.innerHTML = "▶ boyfriend - aeter";
    } else {
        audio.play();
        musicBtn.innerHTML = "⏸ boyfriend - aeter";
    }
    isPlaying = !isPlaying;
};
</script>

</body>
</html>
