<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pixiefella/title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url('https://cdn.discordapp.com/attachments/1520149720855613441/1520160618102001734/banner.jpg?ex=6a402f66&is=6a3edde6&hm=19ec43720f5437aac941da6e1815054ab8a228e82d629e9e3ea0990866ce4344&animated=true') center/cover no-repeat fixed;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
}

#intro {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    background: rgba(0,0,0,0.8);
}

.pfp {
    width: 180px;
    border-radius: 50%;
    border: 5px solid #ff2e63;
    box-shadow: 0 0 50px #ff2e63;
    margin-bottom: 20px;
}

.username {
    font-family: 'Orbitron';
    font-size: 42px;
}

.enter-btn {
    margin-top: 40px;
    padding: 16px 70px;
    border: 2px solid #00ffcc;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.enter-btn:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 30px #00ffcc;
}

#main {
    display: none;
    position: relative;
    z-index: 2;
    padding: 60px;
}

.container {
    display: flex;
    gap: 60px;
    max-width: 1100px;
    margin: auto;
    align-items: center;
}

.left {
    flex: 1;
    display: flex;
    justify-content: center;
}

.main-pfp {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff2e63;
    box-shadow: 0 0 40px rgba(255, 0, 100, 0.7);
}

.right {
    flex: 1;
}

.name {
    font-family: 'Orbitron';
    font-size: 50px;
    margin-bottom: 10px;
}

.tag {
    opacity: 0.6;
    margin-bottom: 10px;
}

.views {
    opacity: 0.7;
    font-size: 15px;
    margin-bottom: 30px;
}

.bio {
    font-size: 18px;
    line-height: 2;
    margin-bottom: 40px;
}

.buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    padding: 14px 24px;
    border-radius: 10px;
    border: 2px solid #ff2e63;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ff2e63;
    box-shadow: 0 0 25px #ff2e63;
}

.music {
    border-color: #00ffcc;
}

.music:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 25px #00ffcc;
}

@media(max-width: 800px) {
    .container {
        flex-direction: column;
        text-align: center;
    }

    .main-pfp {
        width: 170px;
        height: 170px;
    }
}
</style>
</head>

<body>

<div id="intro">
    <img src="https://cdn.discordapp.com/avatars/1490463925257633833/99204bd88404031d3709c4953c3287c3.webp?size=1024" class="pfp">
    <div class="username">pixie</div>
    <div class="enter-btn" id="enterBtn">enter</div>
</div>

<div id="main">
    <div class="container">

        <div class="left">
            <img src="https://cdn.discordapp.com/avatars/1490463925257633833/99204bd88404031d3709c4953c3287c3.webp?size=1024" class="main-pfp">
        </div>

        <div class="right">
            <div class="name">pixie</div>

            <div class="tag">@pixielmao</div>

            <div class="views">
                👁 <span id="viewCount">0</span>
            </div>

            <div class="bio">
                ivy <3<br>
                twins - ires, alyssa, skinz, haze, cosmo, bry, rytec, barkin, boba, fays, zenix, biggy, dodo, plas, icee, dre1mer, gweg, snicks<br>
            </div>

            <div class="buttons">
                <div class="btn music" id="musicBtn">⏸ crash - bunii</div>
            </div>
        </div>

    </div>
</div>

<audio id="audioPlayer" loop></audio>

<script>
const enterBtn = document.getElementById('enterBtn');
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const musicBtn = document.getElementById('musicBtn');
const audio = document.getElementById('audioPlayer');
const viewCount = document.getElementById('viewCount');

let isPlaying = true;

audio.src = "https://cdn.discordapp.com/attachments/1480007166134849698/1505413938987143349/bunii_-_crash_Official_Music_Video.mp3?ex=6a0a897c&is=6a0937fc&hm=fe686d8ac6a691f8baf81dac365f9b69bbdeaf58c315d0177d6000212a4dc66b&";

let views = localStorage.getItem("gunslol_views");

if (!views) {
    views = Math.floor(Math.random() * 9000) + 1000;
} else {
    views = parseInt(views) + Math.floor(Math.random() * 3);
}

localStorage.setItem("gunslol_views", views);

let fakeViews = views + Math.floor(Math.random() * 5);

viewCount.innerText = fakeViews.toLocaleString();

enterBtn.onclick = () => {
    intro.style.display = "none";
    main.style.display = "block";
    audio.play().catch(()=>{});
};

musicBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        musicBtn.innerHTML = "▶ crash - bunii";
    } else {
        audio.play();
        musicBtn.innerHTML = "⏸ crash - bunii";
    }

    isPlaying = !isPlaying;
};
</script>

</body>
</html>
