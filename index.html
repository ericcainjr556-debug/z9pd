<!DOCTYPE html>
<html>
<head>
  <title>Pixie Bio</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      margin-top: 120px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      color: gray;
    }

    a {
      display: block;
      margin: 12px auto;
      width: 200px;
      padding: 12px;
      background: #111;
      border: 1px solid #333;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.2s;
    }

    a:hover {
      background: #222;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Pixie</h1>
    <p>Game dev / Modder</p>

    <a href="#">Discord</a>
    <a href="#">TikTok</a>
    <a href="#">YouTube</a>
  </div>
</body>
</html>
