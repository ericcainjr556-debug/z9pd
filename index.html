<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mommy.</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url('https://media.discordapp.net/attachments/1490566964731580456/1501336166803181598/banner.jpg?ex=69fbb3c3&is=69fa6243&hm=905b1fa7d96b61a56954d63d529d577244f52f6026d8c965d30dae04975d3913&animated=true') center/cover no-repeat fixed;
    color: white;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
}

/* INTRO */
#intro {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    background: rgba(0,0,0,0.8);
}

.pfp {
    width: 180px;
    border-radius: 50%;
    border: 5px solid #ff2e63;
    box-shadow: 0 0 50px #ff2e63;
    margin-bottom: 20px;
}

.username {
    font-family: 'Orbitron';
    font-size: 42px;
}

.enter-btn {
    margin-top: 40px;
    padding: 16px 70px;
    border: 2px solid #00ffcc;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.enter-btn:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 30px #00ffcc;
}

/* MAIN */
#main {
    display: none;
    position: relative;
    z-index: 2;
    padding: 60px;
}

/* LAYOUT */
.container {
    display: flex;
    gap: 60px;
    max-width: 1100px;
    margin: auto;
    align-items: center;
}

/* LEFT SIDE */
.left {
    flex: 1;
    display: flex;
    justify-content: center;
}

/* 🔥 FIXED PFP */
.main-pfp {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff2e63;
    box-shadow: 0 0 40px rgba(255, 0, 100, 0.7);
}

/* RIGHT SIDE */
.right {
    flex: 1;
}

.name {
    font-family: 'Orbitron';
    font-size: 50px;
    margin-bottom: 10px;
}

.tag {
    opacity: 0.6;
    margin-bottom: 30px;
}

/* BIO */
.bio {
    font-size: 18px;
    line-height: 2;
    margin-bottom: 40px;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    padding: 14px 24px;
    border-radius: 10px;
    border: 2px solid #ff2e63;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ff2e63;
    box-shadow: 0 0 25px #ff2e63;
}

/* MUSIC BUTTON */
.music {
    border-color: #00ffcc;
}

.music:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 25px #00ffcc;
}

/* MOBILE */
@media(max-width: 800px) {
    .container {
        flex-direction: column;
        text-align: center;
    }

    .main-pfp {
        width: 170px;
        height: 170px;
    }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="https://media.discordapp.net/attachments/1490566964731580456/1501336166203654215/pixiescoolcat.webp?ex=69fbb3c3&is=69fa6243&hm=3ba8aa3bd750c6159dbb390d61af31822d2fb6ff03a0f22c90d7c0b0f99f6968&animated=true" class="pfp">
    <div class="username">pixie</div>
    <div class="enter-btn" id="enterBtn">enter</div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="container">

        <!-- LEFT -->
        <div class="left">
            <img src="https://media.discordapp.net/attachments/1490566964731580456/1501336166203654215/pixiescoolcat.webp?ex=69fbb3c3&is=69fa6243&hm=3ba8aa3bd750c6159dbb390d61af31822d2fb6ff03a0f22c90d7c0b0f99f6968&animated=true" class="main-pfp">
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div class="name">pixie</div>
            <div class="tag">@mommy46.</div>

            <div class="bio">
                i thought things were getting better ?<br>
                brooklyn my baby <3<br>
                friends - gwegg, snickss, kodaa, sk1rtz, palmtree, valvee, whatdoidoo
            </div>

            <div class="buttons">
                <div class="btn music" id="musicBtn">⏸ whats the point - s0rrow</div>
            </div>
        </div>

    </div>
</div>

<audio id="audioPlayer" loop></audio>

<script>
const enterBtn = document.getElementById('enterBtn');
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const musicBtn = document.getElementById('musicBtn');
const audio = document.getElementById('audioPlayer');

let isPlaying = true;

audio.src = "https://cdn.discordapp.com/attachments/1490566964731580456/1501335449485181128/whats_the_point.mp3?ex=69fbb318&is=69fa6198&hm=1e8af66dfb8aef16b70043f5350ef04627a7133d172d8aaa40c2d571693b7e34&";

enterBtn.onclick = () => {
    intro.style.display = "none";
    main.style.display = "block";
    audio.play().catch(()=>{});
};

musicBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        musicBtn.innerHTML = "▶ whats the point - s0rrow";
    } else {
        audio.play();
        musicBtn.innerHTML = "⏸ whats the point - s0rrow";
    }
    isPlaying = !isPlaying;
};
</script>

</body>
</html>
