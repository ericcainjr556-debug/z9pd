    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #1a0d0d url('https://cdn.discordapp.com/attachments/1474143370346496111/1486149553748181196/T_LS-FNBR-KetArt.webp?ex=69c47420&is=69c322a0&hm=e56c950b48adf92aab86fff1cabb5cf1aa6aaf6e53a99b682be3dd727d7c066b&') center/cover no-repeat fixed;
            color: #ff3366;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Intro Screen */
        #intro {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(26, 13, 13, 0.75); /* Dark overlay so text is readable */
            z-index: 10;
            transition: opacity 1.2s ease;
        }

        .pfp {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid #ff3366;
            box-shadow: 0 0 50px #ff0000;
            margin-bottom: 40px;
        }

        .username {
            font-size: 42px;
            color: #ff6699;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        .status {
            font-size: 18px;
            color: #ff99bb;
            margin-bottom: 80px;
            letter-spacing: 2px;
        }

        .enter-btn {
            padding: 22px 90px;
            border: 5px solid #00ff99;
            color: #00ff99;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.4s;
            letter-spacing: 2px;
        }

        .enter-btn:hover {
            background: #00ff99;
            color: #1a0d0d;
            box-shadow: 0 0 40px #00ff99;
        }

        /* Main Page */
        #main {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 60px 40px;
            background: rgba(26, 13, 13, 0.85); /* Dark overlay for readability */
            overflow-y: auto;
        }

        .main-pfp {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid #ff3366;
            margin-bottom: 35px;
        }

        .main-username {
            font-size: 34px;
            color: #ff6699;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .bio {
            max-width: 620px;
            text-align: center;
            font-size: 16.5px;
            line-height: 2.1;
            color: #ff99bb;
            letter-spacing: 0.8px;
            margin-bottom: 70px;
        }

        .music-btn {
            padding: 16px 60px;
            border: 4px solid #ff3366;
            color: #ff3366;
            font-size: 17px;
            cursor: pointer;
            background: transparent;
            transition: all 0.3s;
            letter-spacing: 1.5px;
        }

        .music-btn:hover {
            background: #ff3366;
            color: #1a0d0d;
        }
    </style>

<body>

    <!-- Intro Screen -->
    <div id="intro" style="opacity: 0; display: none;">
        <img src="./pixie_files/57841d6ddddd55644040fe6bc0fb1ea4.webp" alt="pixie" class="pfp">
        <div class="username">pixie</div>
        <div class="status">z9pd</div>
        <div class="enter-btn" id="enterBtn">Click to Enter</div>
    </div>

    <!-- Main Bio Page -->
    <div id="main" style="display: flex;">
        <img src="./pixie_files/57841d6ddddd55644040fe6bc0fb1ea4.webp" alt="pixie" class="main-pfp">
        <div class="main-username">@z9pd</div>

        <div class="bio">
            16 in 8 months<br>
            Alana 💖<br>
            best friends - Ires, Kdot, Momkey, PalmTree, Koda, Gweg
            developer/modder<br>
        </div>

        <button class="music-btn" id="musicBtn" style="border-color: rgb(0, 255, 153); color: rgb(0, 255, 153);">⏸ boyfriend - aeter</button>
        <audio id="audioPlayer" loop="" src="https://cdn.discordapp.com/attachments/1485354899272372364/1486146593077067826/boyfriend.mp3?ex=69c4715f&amp;is=69c31fdf&amp;hm=9da891662bce36c0e4152bd7f12ac4235c5854e943392e43fa376dcd7a507865&amp;"></audio>
    </div>

    <script>
        const enterBtn = document.getElementById('enterBtn');
        const intro = document.getElementById('intro');
        const main = document.getElementById('main');
        const musicBtn = document.getElementById('musicBtn');
        const audio = document.getElementById('audioPlayer');

        let isPlaying = true;

        // Your music link
        audio.src = "https://cdn.discordapp.com/attachments/1485354899272372364/1486146593077067826/boyfriend.mp3?ex=69c4715f&is=69c31fdf&hm=9da891662bce36c0e4152bd7f12ac4235c5854e943392e43fa376dcd7a507865&";

        enterBtn.addEventListener('click', () => {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.display = 'flex';
                
                // Auto play music when entering
                audio.play().catch(err => {
                    console.log("Autoplay blocked by browser");
                });
            }, 1200);
        });

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                musicBtn.innerHTML = "▶ boyfriend - aeter";
                musicBtn.style.borderColor = "#ff3366";
                musicBtn.style.color = "#ff3366";
            } else {
                audio.play();
                musicBtn.innerHTML = "⏸ boyfriend - aeter";
                musicBtn.style.borderColor = "#00ff99";
                musicBtn.style.color = "#00ff99";
            }
            isPlaying = !isPlaying;
        });
    </script>
