<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pixie</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url('https://cdn.discordapp.com/attachments/1478515857222139934/1498125293297205298/banner.jpg?ex=69f00567&is=69eeb3e7&hm=d83a35ddc4321a152b660302025b0ac4f20a934062e130aa3a58c60600d52caf&') center/cover no-repeat fixed;
    color: white;
}

/* DARK OVERLAY */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
}

/* INTRO */
#intro {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    background: rgba(0,0,0,0.8);
}

.pfp {
    width: 180px;
    border-radius: 50%;
    border: 5px solid #ff2e63;
    box-shadow: 0 0 50px #ff2e63;
    margin-bottom: 20px;
}

.username {
    font-family: 'Orbitron';
    font-size: 42px;
}

.enter-btn {
    margin-top: 40px;
    padding: 16px 70px;
    border: 2px solid #00ffcc;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.enter-btn:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 30px #00ffcc;
}

/* MAIN */
#main {
    display: none;
    position: relative;
    z-index: 2;
    padding: 60px;
}

/* LAYOUT */
.container {
    display: flex;
    gap: 60px;
    max-width: 1100px;
    margin: auto;
    align-items: center;
}

/* LEFT SIDE */
.left {
    flex: 1;
    display: flex;
    justify-content: center;
}

/* 🔥 FIXED PFP */
.main-pfp {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff2e63;
    box-shadow: 0 0 40px rgba(255, 0, 100, 0.7);
}

/* RIGHT SIDE */
.right {
    flex: 1;
}

.name {
    font-family: 'Orbitron';
    font-size: 50px;
    margin-bottom: 10px;
}

.tag {
    opacity: 0.6;
    margin-bottom: 30px;
}

/* BIO */
.bio {
    font-size: 18px;
    line-height: 2;
    margin-bottom: 40px;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    padding: 14px 24px;
    border-radius: 10px;
    border: 2px solid #ff2e63;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #ff2e63;
    box-shadow: 0 0 25px #ff2e63;
}

/* MUSIC BUTTON */
.music {
    border-color: #00ffcc;
}

.music:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 25px #00ffcc;
}

/* MOBILE */
@media(max-width: 800px) {
    .container {
        flex-direction: column;
        text-align: center;
    }

    .main-pfp {
        width: 170px;
        height: 170px;
    }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <img src="https://cdn.discordapp.com/avatars/1477748773957669005/d124c1adce9dcbddfa97f3088a62c392.webp?size=1024" class="pfp">
    <div class="username">pixie</div>
    <div class="enter-btn" id="enterBtn">enter</div>
</div>

<!-- MAIN -->
<div id="main">
    <div class="container">

        <!-- LEFT -->
        <div class="left">
            <img src="https://cdn.discordapp.com/avatars/1477748773957669005/d124c1adce9dcbddfa97f3088a62c392.webp?size=1024" class="main-pfp">
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div class="name">pixie</div>
            <div class="tag">@z9pd</div>

            <div class="bio">
                15<br>
                maybe quitting<br>
                Brooklyn <3<br>
                Gwegggg
            </div>

            <div class="buttons">
                <div class="btn music" id="musicBtn">⏸ crash - bunii</div>
            </div>
        </div>

    </div>
</div>

<audio id="audioPlayer" loop></audio>

<script>
const enterBtn = document.getElementById('enterBtn');
const intro = document.getElementById('intro');
const main = document.getElementById('main');
const musicBtn = document.getElementById('musicBtn');
const audio = document.getElementById('audioPlayer');

let isPlaying = true;

audio.src = "https://cdn.discordapp.com/attachments/1478515857222139934/1498125202712821951/bunii_-_crash_Official_Music_Video.mp3?ex=69f00552&is=69eeb3d2&hm=8ac3b60162620e8ee7028f75bedb25e463908d8401b18e7279533143080592ed&";

enterBtn.onclick = () => {
    intro.style.display = "none";
    main.style.display = "block";
    audio.play().catch(()=>{});
};

musicBtn.onclick = () => {
    if (isPlaying) {
        audio.pause();
        musicBtn.innerHTML = "▶ crash - bunii";
    } else {
        audio.play();
        musicBtn.innerHTML = "⏸ crash - bunii";
    }
    isPlaying = !isPlaying;
};
</script>

</body>
</html>
